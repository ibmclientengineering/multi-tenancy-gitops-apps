apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    app: mq-spring-app
  name: mq-spring-app
  namespace: dev
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: mq-spring-app
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mq-spring-app
    spec:
      containers:
        - env:
            - name: QM
              value: QM1
            - name: CHANNEL
              value: IBM.APP.SVRCONN
            - name: CONNECTION_NAME
              value: qm1-ibm-mq.dev.svc(1414)
            - name: APP_MQ_QUEUENAME
              value: IBM.DEMO.Q
            - name: APP_MQ_QUEUE_NAME
              value: IBM.DEMO.Q
            - name: USER
            - name: PASSWORD
          image: quay.io/apalumbo925/mq-spring-app:0.0.11
          imagePullPolicy: IfNotPresent
          name: app
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: quay-pull
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
