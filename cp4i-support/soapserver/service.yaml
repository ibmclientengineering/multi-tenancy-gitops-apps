apiVersion: v1
kind: Service
metadata:
  annotations: {}
  name: soapserver-nonsecure
  namespace: tools
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: soapserver-nonsecure
  sessionAffinity: None
  type: ClusterIP
