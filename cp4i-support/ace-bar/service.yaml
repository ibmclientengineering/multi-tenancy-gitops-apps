apiVersion: v1
kind: Service
metadata:
  annotations: {}
  name: ace-bar
  namespace: tools
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    app: ace-bar
  sessionAffinity: None
  type: ClusterIP
