apiVersion: mq.ibm.com/v1beta1
kind: QueueManager
metadata:
  name: qm1
  annotations:
    argocd.argoproj.io/sync-wave: "300"
    helm.sh/hook-weight: "300"
  labels:
    promote-demo: hardened-run
spec:
  license:
    accept: true
    license: L-VEMB-RABZSN
    use: NonProduction
  queueManager:
    debug: false
    livenessProbe:
      failureThreshold: 1
      initialDelaySeconds: 90
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 5
    logFormat: Basic
    metrics:
      enabled: true
    name: QM1
    mqsc:
      - configMap:
          name: mqsc-configmap
          items:
            - static-definitions.mqsc
    readinessProbe:
      failureThreshold: 1
      initialDelaySeconds: 10
      periodSeconds: 5
      successThreshold: 1
      timeoutSeconds: 3
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "1"
        memory: 1Gi
    availability:
      type: SingleInstance
    # Tag 0ca55c9 is the image the 2026-07 validation pipeline built and tested
    # (from mq-qm01 commit 0ca55c9). The registry path assumes the integrated
    # registry with the pipeline running in ci — the mq-qm-dev gitops stage
    # stamps this line on every delivery.
    image: quay.io/apalumbo925/mq-qm01:0.0.6
    imagePullPolicy: Always
    storage:
      persistedData:
        enabled: false
      queueManager:
        type: ephemeral
      recoveryLogs:
        enabled: false
  securityContext:
    initVolumeAsRoot: false
  template:
    pod:
      containers:
        - name: qmgr
          env:
            - name: MQSNOAUT
              value: "yes"
  terminationGracePeriodSeconds: 30
  tracing:
    agent: {}
    collector: {}
    enabled: false
    namespace: ""
  version: 10.0.0.0-r1
  web:
    enabled: true
